name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Server tests + Client typecheck + build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: clickfamily
          POSTGRES_USER: clickfamily
          POSTGRES_PASSWORD: clickfamily_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: development
      PORT: 3001
      CLIENT_URL: http://localhost:5173
      DATABASE_URL: postgresql://clickfamily:clickfamily_dev@localhost:5432/clickfamily
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: clickfamily
      DB_USER: clickfamily
      DB_PASSWORD: clickfamily_dev
      JWT_SECRET: ci-test-secret-do-not-use-in-prod
      JWT_ACCESS_EXPIRES: 24h
      JWT_REFRESH_EXPIRES: 7d
      OTP_DEV_CODE: "0000"
      OTP_TTL_SECONDS: 300
      CLICK_INTEGRATION_API_URL: https://api.click.uz/integration
      CLICK_INTEGRATION_TOKEN: ""
      CLICK_INTEGRATION_MODE: mock

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U clickfamily > /dev/null 2>&1; then
              echo "Postgres is up"; exit 0
            fi
            sleep 2
          done
          echo "Postgres did not start in time"; exit 1
        env:
          PGPASSWORD: clickfamily_dev

      - name: Apply database migrations
        run: pnpm --filter server run migrate

      - name: Server tests (10 expected)
        run: pnpm --filter server run test

      - name: Client TypeScript check
        run: pnpm --filter client exec tsc --noEmit

      - name: Client build
        run: pnpm --filter client run build
